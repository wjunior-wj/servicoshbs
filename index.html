<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CazéTV · Serviços FIFA · Copa 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#E8002D;--purple:#7B2D8B;--cyan:#007A99;--lime:#8AA800;
  --bg:#F4F4F2;--surface:#FFFFFF;--card:#FFFFFF;--raised:#EEEEEC;
  --border:#E0E0DC;--border2:#C8C8C4;--text:#111111;--text2:#333333;--muted:#777777;--dim:#AAAAAA}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);font-family:'Noto Sans',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;-webkit-text-size-adjust:100%}
.hdr{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hdr-brand{display:flex;align-items:center;gap:10px;min-width:0}
.hdr-logo{height:32px;width:32px;flex-shrink:0;background:var(--red);border-radius:3px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff}
.hdr-title{font-weight:900;font-size:14px;letter-spacing:.03em;text-transform:uppercase;white-space:nowrap}
.hdr-sub{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.hdr-pills{display:flex;gap:6px;flex-shrink:0}
.hdr-pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;border:1px solid;white-space:nowrap}
.hdr-tabs{display:flex;gap:2px;margin-left:12px}
.hdr-tab{font-size:11px;font-weight:700;padding:5px 14px;border-radius:3px;cursor:pointer;border:1px solid var(--border2);color:var(--muted);background:transparent;transition:all .15s;-webkit-tap-highlight-color:transparent}
.hdr-tab:hover{color:var(--text);border-color:var(--text2)}
.hdr-tab.on{background:var(--text);color:var(--surface);border-color:var(--text)}
@media(max-width:480px){.hdr-pills{display:none}}

/* Painel de Serviços */
.panel{padding:24px 20px}
@media(min-width:681px){.panel{padding:28px 36px;max-width:980px;margin:0 auto}}
.panel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:20px}
@media(max-width:480px){.panel-grid{grid-template-columns:1fr}}
.panel-title{font-size:22px;font-weight:900;letter-spacing:-.01em;margin-bottom:4px}
.panel-sub{font-size:12px;color:var(--muted);margin-bottom:2px}
.svc-card{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:box-shadow .2s}
.svc-card:hover{box-shadow:0 4px 18px rgba(0,0,0,.1)}
.svc-card-top{padding:16px 16px 12px;position:relative}
.svc-card-stripe{position:absolute;top:0;left:0;right:0;height:3px}
.svc-card-booking{font-family:monospace;font-size:10px;font-weight:900;padding:2px 7px;border-radius:2px;border:1px solid;display:inline-flex;align-items:center;gap:4px;margin-bottom:8px}
.svc-card-name{font-size:16px;font-weight:900;margin-bottom:3px}
.svc-card-cos{font-size:10px;color:var(--muted);margin-bottom:10px;font-style:italic}
.svc-card-body{padding:0 16px 14px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--border);padding-top:12px}
.svc-card-row{display:flex;gap:8px;align-items:flex-start}
.svc-card-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);min-width:68px;padding-top:1px;flex-shrink:0}
.svc-card-val{font-size:11px;color:var(--text2);flex:1;line-height:1.4}
.svc-card-maxp{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:5px 10px;border-radius:3px;font-size:10px;font-weight:700}
.svc-card-freq{font-size:9px;color:var(--muted);margin-top:2px}
.inet-badge{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:2px;background:rgba(0,122,153,.1);color:var(--cyan);border:1px solid rgba(0,122,153,.25);margin-top:6px}
.layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 56px)}
@media(max-width:680px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
  .fsec{margin-bottom:0;flex:1;min-width:130px}
  .btn-clear{width:auto;flex-shrink:0}
}
.sidebar{border-right:1px solid var(--border);padding:16px 14px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;background:var(--surface)}
.flbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.15em;margin-bottom:7px}
.fsec{margin-bottom:16px}
.finput{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;font-family:inherit;font-size:13px;border-radius:4px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.finput:focus{border-color:var(--cyan)}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{padding:5px 10px;border-radius:3px;border:1px solid var(--border2);color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;background:var(--bg);-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--text2);color:var(--text2)}
.chip.on{background:var(--red);color:#fff;border-color:var(--red)}
.chip.r1.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.chip.r2.on{background:var(--cyan);color:#fff;border-color:var(--cyan)}
.chip.r3.on{background:var(--lime);color:#fff;border-color:var(--lime)}
.perfil-chip{font-size:9px;padding:4px 8px;border-radius:2px;cursor:pointer;border:1px solid;transition:all .15s;font-weight:600;-webkit-tap-highlight-color:transparent}
.btn-clear{width:100%;background:transparent;border:1px solid var(--border2);color:var(--dim);padding:8px;font-family:inherit;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;border-radius:4px;cursor:pointer;transition:all .15s}
.btn-clear:hover{border-color:var(--red);color:var(--red)}
.status-bar{font-size:10px;padding:4px 0;color:var(--muted);display:flex;align-items:center;gap:6px}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-dot.ok{background:#22c55e}.status-dot.loading{background:var(--cyan);animation:pulse 1s infinite}.status-dot.err{background:var(--red)}.status-dot.local{background:var(--dim)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:18px 16px}
@media(min-width:681px){.content{padding:22px 24px}}
.ctop{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.ccount{font-size:11px;color:var(--muted)}
.ccount strong{color:var(--text);font-weight:700}
.rodada-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;margin-top:24px}
.rodada-header:first-child{margin-top:0}
.rodada-badge{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:2px;white-space:nowrap}
.rodada-line{flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:9px;margin-bottom:6px}
@media(max-width:480px){.grid{grid-template-columns:1fr;gap:7px}}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:12px 14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.gcard:active{transform:scale(.987)}
@media(hover:hover){.gcard:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.1)}}
.gcard.bra{border-left:3px solid var(--lime)}
.gcard.bra::after{content:'BRA';position:absolute;top:0;right:0;background:var(--lime);color:#fff;font-size:8px;font-weight:900;letter-spacing:.08em;padding:2px 6px;border-bottom-left-radius:3px}
.gtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.gnum{font-size:10px;color:var(--dim);font-weight:600}
.gpick{font-size:9px;color:var(--dim);max-width:160px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gmatch{font-size:14px;font-weight:900;letter-spacing:-.01em;line-height:1.25;margin-bottom:2px}
.gvs{color:var(--dim);margin:0 5px;font-size:13px;font-weight:400}
.gnames{font-size:10px;color:var(--muted);margin-bottom:3px;font-style:italic}
.gmeta{font-size:10px;color:var(--muted);margin-bottom:7px}
.gperfil{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:2px;margin-bottom:7px;border:1px solid}
.gpills{padding-top:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
.gpills-row{display:flex;flex-wrap:wrap;gap:3px}
.svc-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:2px;border:1px solid;white-space:nowrap}
.inet-row{display:flex;flex-wrap:wrap;gap:3px}
.inet-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:2px;background:rgba(0,122,153,.1);color:var(--cyan);border:1px solid rgba(0,122,153,.25);display:flex;align-items:center;gap:3px;white-space:nowrap}
.inet-tag::before{content:'⚡';font-size:8px}
.nosvc{font-size:10px;color:var(--dim);font-style:italic}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;overflow-y:auto;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
@media(min-width:681px){.overlay{align-items:flex-start;padding:28px 16px}}
.modal{background:var(--surface);border:1px solid var(--border2);width:100%;max-width:820px;overflow:hidden;animation:slideup .25s ease-out;box-shadow:0 -4px 40px rgba(0,0,0,.15);border-radius:14px 14px 0 0;max-height:92vh;display:flex;flex-direction:column}
@media(min-width:681px){.modal{border-radius:6px;max-height:none;box-shadow:0 20px 60px rgba(0,0,0,.18)}}
@keyframes slideup{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-drag{display:flex;justify-content:center;padding:10px 0 4px;flex-shrink:0}
.modal-drag-bar{width:36px;height:4px;background:var(--border2);border-radius:2px}
@media(min-width:681px){.modal-drag{display:none}}
.modal-scroll{overflow-y:auto;flex:1}
.mhero{padding:18px 18px 16px;background:#111;border-bottom:1px solid #222;position:relative;flex-shrink:0}
@media(min-width:681px){.mhero{padding:22px 28px 20px}}
.mhero-stripe{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--red) 0%,var(--purple) 33%,#00A9CE 66%,#8AA800 100%)}
.mclose{position:absolute;top:14px;right:14px;background:#222;border:1px solid #333;color:#eee;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.mclose:hover{background:var(--red);border-color:var(--red)}
.mrodada{font-size:9px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;margin-bottom:4px}
.mmatch{font-size:20px;font-weight:900;letter-spacing:-.01em;line-height:1.15;margin-bottom:4px;color:#f0f0f0}
@media(min-width:681px){.mmatch{font-size:26px}}
.mmatch .vs{color:#444;margin:0 8px;font-size:20px;font-weight:400}
.mnames{font-size:12px;color:#888;margin-bottom:10px;font-style:italic}
.mmeta{display:flex;gap:12px;flex-wrap:wrap;font-size:10px}
@media(min-width:681px){.mmeta{font-size:11px;gap:18px}}
.mm-item .lbl{color:#555;font-weight:700;text-transform:uppercase;font-size:9px;letter-spacing:.1em}
.mm-item .val{color:#ddd;font-weight:700;margin-left:4px}
.mbody{padding:16px}
@media(min-width:681px){.mbody{padding:22px 28px}}
.sec{margin-bottom:20px}
.sec-hdr{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:7px;border-bottom:1px solid var(--border);margin-bottom:11px}
.sec-title{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--text2)}
.sec-ct{font-size:10px;color:var(--muted)}
.internet-banner{background:rgba(0,122,153,.06);border:1px solid rgba(0,122,153,.2);border-left:3px solid var(--cyan);border-radius:4px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.inet-icon{font-size:18px;flex-shrink:0}
.inet-info{flex:1;min-width:0}
.inet-name{font-size:12px;font-weight:700;color:var(--cyan)}
.inet-desc{font-size:10px;color:var(--muted);margin-top:1px}
.inet-booking{font-size:11px;font-weight:900;font-family:monospace;color:var(--cyan);background:rgba(0,122,153,.1);padding:3px 7px;border-radius:3px;border:1px solid rgba(0,122,153,.2);white-space:nowrap;flex-shrink:0}
.svc-list{display:flex;flex-direction:column;gap:5px}
.svc-item{border-radius:4px;overflow:hidden;border:1px solid var(--border);background:var(--card)}
.svc-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;cursor:pointer;gap:10px;transition:background .1s;-webkit-tap-highlight-color:transparent}
.svc-row:hover{background:var(--raised)}
.svc-left{display:flex;align-items:center;gap:9px;min-width:0}
.svc-booking{font-size:10px;font-weight:900;padding:2px 6px;border-radius:2px;border:1px solid;font-family:monospace;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.svc-booking.pending{opacity:.6;font-style:italic}
.svc-name{font-weight:700;font-size:13px;color:var(--text)}
.svc-qty{color:var(--muted);font-size:11px;font-weight:400;margin-left:3px}
.svc-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.svc-equip{font-size:10px;color:var(--muted);display:none}
@media(min-width:500px){.svc-equip{display:block}}
.svc-tog{font-size:14px;color:var(--dim);width:18px;text-align:center}
.svc-detail{padding:12px;border-top:1px dashed var(--border);background:var(--raised)}
.detail-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:12px}
@media(min-width:500px){.detail-grid{grid-template-columns:repeat(2,1fr);gap:9px 20px}}
.dr{display:flex;gap:8px}
.dr-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);min-width:72px;padding-top:1px;flex-shrink:0}
.dr-val{color:var(--text2);font-size:12px;flex:1;line-height:1.4}
.dr-full{grid-column:1/-1}
.booking-hl{font-weight:900;font-family:monospace;font-size:13px}
.booking-pending{font-size:10px;color:var(--muted);font-style:italic;margin-left:4px}
.pessoas-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.pessoas-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
.pessoas-grid{display:grid;gap:6px}
.pessoa-row{display:flex;align-items:center;gap:8px}
.pessoa-num{font-size:9px;color:var(--dim);font-weight:700;min-width:16px;text-align:right;font-family:monospace}
.pessoa-input{flex:1;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:8px 10px;font-family:inherit;font-size:13px;border-radius:3px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.pessoa-input:focus{border-color:var(--cyan)}
.pessoa-input::placeholder{color:var(--dim)}
.mfoot{padding:14px 16px;border-top:1px solid var(--border);background:var(--raised);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;padding-bottom:max(14px,env(safe-area-inset-bottom))}
@media(min-width:681px){.mfoot{padding:14px 28px}}
.btn-pdf{background:var(--red);color:#fff;border:none;padding:11px 22px;font-weight:900;border-radius:3px;cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:.08em;text-transform:uppercase;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn-pdf:hover{background:#c0001f;transform:translateY(-1px)}
.btn-pdf:active{transform:scale(.97)}
.foot-hint{font-size:10px;color:var(--muted)}
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-ico{font-size:40px;opacity:.3;margin-bottom:12px}

/* ─── v4: Status badges ─── */
.req-badge{display:inline-flex;align-items:center;gap:3px;font-family:monospace;font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;background:rgba(217,119,6,.12);color:#B45309;border:1px solid rgba(217,119,6,.4);letter-spacing:.05em;margin-left:5px;vertical-align:middle}
.req-banner{background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.35);padding:9px 12px;border-radius:4px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start;font-size:11px;color:#7C2D12;line-height:1.5}
.req-banner-icon{font-size:14px;flex-shrink:0;margin-top:-1px}
.req-banner strong{color:#7C2D12;font-weight:700;display:block;margin-bottom:2px;font-size:10px;letter-spacing:.08em;text-transform:uppercase}

/* destaque sutil em jogos do Brasil */
.gcard.bra{border-width:2px;border-color:#FFCC00;box-shadow:0 0 0 1px rgba(255,204,0,.15)}
.gcard.bra:hover{border-color:#FFB800;box-shadow:0 2px 12px rgba(255,204,0,.2)}

/* Acessos de mídia (agrupados, colapsável) */
.media-block{margin-top:10px;border:1px dashed var(--border2);border-radius:4px;background:var(--bg);overflow:hidden}
.media-tog{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:transparent;border:none;font:inherit;cursor:pointer;color:var(--text2);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;-webkit-tap-highlight-color:transparent}
.media-tog:hover{color:var(--text);background:rgba(0,0,0,.02)}
.media-tog-arrow{font-family:monospace;color:var(--muted);transition:transform .15s}
.media-tog.open .media-tog-arrow{transform:rotate(90deg);color:var(--text)}
.media-list{display:none;padding:4px 12px 10px;flex-direction:column;gap:5px}
.media-list.open{display:flex}
.media-item{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:6px 9px;background:var(--surface);border-radius:3px;font-size:11px}
.media-item-name{font-weight:600;color:var(--text2)}
.media-item-name small{display:block;font-family:monospace;font-size:9px;color:var(--muted);margin-top:1px;letter-spacing:.04em}
.media-item-qty{font-family:monospace;font-size:11px;font-weight:700;color:var(--text)}

/* admin panel */
.admin-fab{position:fixed;bottom:18px;right:18px;width:42px;height:42px;border-radius:50%;background:var(--text);color:#fff;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.18);z-index:30;transition:transform .15s, background .15s}
.admin-fab:hover{transform:translateY(-2px);background:var(--red)}
.admin-fab.unlocked{background:var(--lime);color:#fff}
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;padding:60px 20px 20px;z-index:80;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.admin-panel{background:var(--surface);border-radius:6px;max-width:520px;width:100%;max-height:calc(100vh - 80px);overflow-y:auto;border:1px solid var(--border)}
.admin-head{padding:18px 20px;border-bottom:1px solid var(--border);background:#0A0A0A;color:#fff;border-radius:6px 6px 0 0;display:flex;justify-content:space-between;align-items:center}
.admin-head h2{font-size:14px;font-weight:900;letter-spacing:.06em;text-transform:uppercase}
.admin-head .close{background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;padding:0 4px}
.admin-body{padding:18px 20px}
.admin-locked-msg{font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.admin-locked-msg strong{color:var(--text)}
.admin-pass-row{display:flex;gap:8px;margin-bottom:8px}
.admin-pass-row input{flex:1;background:var(--bg);border:1px solid var(--border2);padding:9px 11px;font-size:13px;font-family:inherit;border-radius:3px;outline:none}
.admin-pass-row input:focus{border-color:var(--cyan)}
.admin-pass-row button{padding:9px 16px;background:var(--text);color:#fff;border:none;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:3px;cursor:pointer}
.admin-pass-row button:hover{background:var(--red)}
.admin-error{color:var(--red);font-size:11px;margin-top:6px;font-weight:600}
.admin-section{margin-bottom:18px}
.admin-section h3{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.admin-info{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5;padding:9px 11px;background:rgba(217,119,6,.07);border:1px solid rgba(217,119,6,.25);border-radius:3px}
.admin-req-list{display:flex;flex-direction:column;gap:4px;max-height:340px;overflow-y:auto;border:1px solid var(--border);border-radius:3px;background:var(--bg)}
.admin-req-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:9px;align-items:center;padding:8px 11px;border-bottom:1px solid var(--border);background:var(--surface);font-size:11px}
.admin-req-row:last-child{border-bottom:none}
.admin-req-row.confirmed{background:rgba(22,163,74,.05)}
.admin-req-mid{font-family:monospace;font-size:10px;color:var(--muted);font-weight:700;min-width:34px}
.admin-req-name{font-weight:600;line-height:1.3}
.admin-req-name small{display:block;font-size:9px;color:var(--muted);font-weight:400;margin-top:1px}
.admin-req-qty{font-family:monospace;font-size:11px;font-weight:700;color:var(--text)}
.admin-confirm-btn{padding:4px 9px;background:var(--lime);color:#fff;border:none;font:inherit;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-radius:2px;cursor:pointer}
.admin-confirm-btn:hover{background:#759400}
.admin-confirm-btn.undo{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.admin-confirm-btn.undo:hover{color:var(--red);border-color:var(--red)}
.admin-confirm-tag{font-family:monospace;font-size:9px;font-weight:700;color:var(--lime);padding:3px 7px;background:rgba(138,168,0,.12);border:1px solid rgba(138,168,0,.35);border-radius:2px;letter-spacing:.06em}
.admin-foot{padding:12px 20px;border-top:1px solid var(--border);background:var(--bg);font-size:10px;color:var(--muted);text-align:center;line-height:1.5}


/* ObsEditor */
.obs-section{margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.obs-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.obs-input{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:3px;font-family:inherit;font-size:12px;color:var(--text);background:var(--bg);resize:vertical;outline:none;line-height:1.5}
.obs-input:focus{border-color:var(--cyan);background:var(--surface)}
.obs-input::placeholder{color:var(--dim)}

</style>
</head>

// Grava uma célula no Sheets via Apps Script
async function gravar(match_id, col_key, value, token) {
  if (!APPS_SCRIPT_URL) {
    return { ok:false, error:'Salvamento desativado: APPS_SCRIPT_URL não configurado.' };
  }
  try {
    const r = await fetch(APPS_SCRIPT_URL, {
      method:"POST", headers:{"Content-Type":"text/plain"},
      body: JSON.stringify({ match_id, col_key, value, token:token||undefined }),
    });
    let data={};
    try { data = await r.json(); } catch(e) { data = {}; }
    if(!r.ok) return { ok:false, error:data.error||`Erro HTTP ${r.status} ao gravar no Sheets.` };
    return data.ok===false ? data : { ok:true, ...data };
  } catch(e) { return { ok:false, error:e.message||'Erro ao gravar no Sheets.' }; }
}

// Parser CSV com header dinâmico + validação básica
function parseCSVRows(csvText) {
  const text=(csvText||'').replace(/^\uFEFF/,'');
  const rows=[];let row=[],cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(c==='"'){
      if(inQ&&n==='"'){cur+='"';i++;}
      else inQ=!inQ;
    } else if(c===','&&!inQ){row.push(cur.trim());cur='';}
    else if((c==='\n'||c==='\r')&&!inQ){
      if(c==='\r'&&n==='\n')i++;
      row.push(cur.trim());cur='';
      if(row.some(v=>v!==''))rows.push(row);
      row=[];
    } else cur+=c;
  }
  row.push(cur.trim());
  if(row.some(v=>v!==''))rows.push(row);
  return rows;
}

function parseSheetCSV(csvText) {
  const rows=parseCSVRows(csvText);
  const hi=rows.findIndex(r=>r.includes('match_id'));
  if(hi===-1)throw new Error('Cabeçalho inválido: coluna obrigatória match_id não encontrada.');
  const hdr=rows[hi].map(h=>h.trim());
  const required=['jogo_num','match_id','rodada','data','hora','local','sel1','sel2','pick'];
  const missing=required.filter(c=>!hdr.includes(c));
  if(missing.length)throw new Error(`Colunas obrigatórias ausentes: ${missing.join(', ')}.`);
  const get=(r,col)=>{const i=hdr.indexOf(col);return i>=0?(r[i]||'').trim():'';};
  const svcKeys=[...new Set(hdr.filter(h=>h.endsWith('_status')).map(h=>h.replace('_status','')))];
  const validStatuses=['CNF','REQ','','—','-'];
  const errors=[];
  const seen=new Set();
  const dataRows=rows.slice(hi+1).filter(r=>get(r,'match_id').startsWith('M'));
  const parsed=[];

  dataRows.forEach((r,idx)=>{
    const line=hi+2+idx;
    const mid=get(r,'match_id');
    if(seen.has(mid))errors.push(`Linha ${line}: match_id duplicado (${mid}).`);
    seen.add(mid);
    const num=parseInt(get(r,'jogo_num'),10);
    if(!Number.isFinite(num))errors.push(`Linha ${line}: jogo_num inválido para ${mid}.`);
    const data=get(r,'data');
    if(data&&!/^\d{4}-\d{2}-\d{2}$/.test(data))errors.push(`Linha ${line}: data inválida em ${mid}; use YYYY-MM-DD.`);
    const servicos={};
    for(const key of svcKeys){
      const st=get(r,`${key}_status`);
      if(!validStatuses.includes(st))errors.push(`Linha ${line}: status inválido em ${key}_status (${st}). Use CNF, REQ ou vazio.`);
      if(!st||st==='—'||st==='-')continue;
      const rawQty=get(r,`${key}_qty`);
      const qty=rawQty===''?0:parseInt(rawQty,10);
      if(rawQty!==''&&!Number.isFinite(qty))errors.push(`Linha ${line}: quantidade inválida em ${key}_qty (${rawQty}).`);
      if(!SVC_META_FALLBACK[key])errors.push(`Linha ${line}: serviço desconhecido (${key}). Verifique o nome da coluna ${key}_status.`);
      const pessoas=[];let pi=1;
      while(hdr.includes(`${key}_p${pi}`)){pessoas.push(get(r,`${key}_p${pi}`));pi++;}
      const obs=get(r,`${key}_obs`)||'';
      const meta=SVC_META_FALLBACK[key]||{};
      const booking=get(r,`${key}_booking`)||meta.booking||key;
      servicos[key]={st,qty:qty||0,fully:(key==='uniflash_fully'||booking==='21225')&&st==='CNF',booking,pessoas,obs,status:st};
    }
    parsed.push({numero:num||0,match_id:mid,rodada:get(r,'rodada'),
      data:get(r,'data'),dia_semana:get(r,'dia_semana')||'',hora:get(r,'hora'),local:get(r,'local'),
      selecao_1:get(r,'sel1'),selecao_2:get(r,'sel2'),pick:get(r,'pick'),servicos});
  });

  if(!parsed.length)errors.push('Nenhuma linha válida encontrada: match_id deve começar com M.');
  if(errors.length)throw new Error(errors.slice(0,8).join(' | ')+(errors.length>8?` | +${errors.length-8} erro(s).`:''));
  return parsed.filter(j=>j.numero>0);
}

// Helpers de serviço
function svcsLista(jogo){
  const out=[];
  for(const[k,v]of Object.entries(jogo.servicos||{})){
    const s=SVC[k];if(!s||s.inet||s.media)continue;
    const displayNome=s.nome+(v.fully&&!/fully/i.test(s.nome)?' (Fully Equipped)':'');
    out.push({key:k,svc:{...s,nome:displayNome},
      qty:v.qty,status:v.status,fully:v.fully||false,
      booking_actual:v.booking||s.booking,pessoas:v.pessoas||[],obs:v.obs||''});
  }
  const ORD=["Pré-jogo","Campo","Multilateral","Studio","Pós-jogo","Tribuna","Mídia"];
  out.sort((a,b)=>{const da=ORD.indexOf(a.svc.cat||''),db=ORD.indexOf(b.svc.cat||'');return da!==db?da-db:a.svc.nome.localeCompare(b.svc.nome);});
  return out;
}
function mediaLista(jogo){
  return Object.entries(jogo.servicos||{}).filter(([k])=>SVC[k]?.media)
    .map(([k,v])=>{return{key:k,svc:SVC[k],qty:v.qty,status:v.status,pessoas:v.pessoas||[]}});
}
function getInet(jogo){
  return Object.entries(jogo.servicos||{}).filter(([k])=>SVC[k]?.inet)
    .map(([k])=>{const s=SVC[k];return{booking:s.booking,nome:s.nome,descr:s.descr}});
}

function fmtD(iso){if(!iso)return'';const[,m,d]=iso.split('-');return`${d}/${m}`;}
function fmtDL(iso){if(!iso)return'';const ms=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];const[y,m,d]=iso.split('-');return`${d} ${ms[+m-1]} ${y}`;}
function isBRA(j){return['BRA','BRASIL'].some(s=>j.selecao_1===s||j.selecao_2===s);}


function getPerfil(jogo){
  const ks=Object.keys(jogo.servicos||{}).filter(k=>{const s=SVC[k];return s&&!s.inet&&!s.media;});
  if(!ks.length)return'B';
  const hasUniFlash=ks.includes('uniflash')||ks.includes('uniflash_fully');
  if(ks.some(k=>k.startsWith('ml_'))||ks.includes('dressing_room'))return'D';
  if(ks.includes('guest_arrival')&&ks.includes('presentation')&&hasUniFlash&&ks.includes('digital_reporter')&&ks.includes('observer_seat'))return'A';
  if(ks.includes('pitch_reporter')&&ks.includes('digital_reporter')&&ks.includes('observer_seat')&&!ks.includes('presentation')&&!hasUniFlash)return'C';
  if(ks.length===1&&ks.includes('pitch_reporter'))return'F';
  return'E';
}

const {useState,useMemo,useEffect,useRef,createElement:h}=React;

function SheetErrorPanel({status,error}){
  const loading=status==='loading';
  return h('div',{className:'empty',style:{maxWidth:760,margin:'40px auto',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:6,textAlign:'left'}},
    h('div',{className:'empty-ico',style:{fontSize:34}},loading?'⏳':'⚠️'),
    h('div',{style:{fontSize:18,fontWeight:900,marginBottom:8,color:loading?'var(--text)':'var(--red)'}},loading?'Carregando dados do Google Sheets':'Dados bloqueados'),
    h('div',{style:{fontSize:13,color:'var(--text2)',lineHeight:1.6}},
      loading?'Aguarde a leitura da planilha publicada em CSV.':'O app não exibiu dados embutidos do HTML para evitar operação com informação desatualizada.'),
    !loading&&h('div',{style:{marginTop:14,padding:12,background:'rgba(232,0,45,.06)',border:'1px solid rgba(232,0,45,.25)',borderRadius:4,fontSize:12,color:'var(--text2)',lineHeight:1.6}},
      h('strong',null,'Motivo: '),error||'Erro não especificado.',
      h('br'),
      'Verifique SHEETS_URL, publicação CSV, cabeçalho match_id e colunas obrigatórias.'
    )
  );
}

function App(){
  const [jogos,setJogos]=useState([]);
  const [srcStatus,setSrcStatus]=useState(SHEETS_URL?'loading':'err');
  const [sheetError,setSheetError]=useState(SHEETS_URL?'':'SHEETS_URL não configurado.');
  const [q,setQ]=useState('');
  const [fR,setFR]=useState('todas');
  const [fP,setFP]=useState('todos');
  const [fSvc,setFSvc]=useState('todos');
  const [sel,setSel]=useState(null);
  const [tick,setTick]=useState(0);
  const [aba,setAba]=useState('jogos');
  const [adminOpen,setAdminOpen]=useState(false);

  useEffect(()=>{
    if(!SHEETS_URL){setJogos([]);setSheetError('SHEETS_URL não configurado.');setSrcStatus('err');return;}
    setSrcStatus('loading');setSheetError('');
    fetch(SHEETS_URL).then(r=>{
      if(!r.ok)throw new Error(`Erro HTTP ${r.status} ao carregar Sheets.`);
      return r.text();
    }).then(csv=>{
      try{
        const p=parseSheetCSV(csv);
        if(p&&p.length>0){setJogos(p);setSrcStatus('ok');}
        else{setJogos([]);setSheetError('A planilha não retornou jogos válidos.');setSrcStatus('err');}
      }
      catch(e){setJogos([]);setSheetError(e.message||'Erro ao validar planilha.');setSrcStatus('err');}
    }).catch(e=>{setJogos([]);setSheetError(e.message||'Erro ao carregar Sheets.');setSrcStatus('err');});
  },[]);

  useEffect(()=>{
    if(!SERVICES_URL)return;
    fetch(SERVICES_URL).then(r=>r.text()).then(csv=>{
      try{
        const lines=parseCSVRows(csv);
        if(lines.length<2)return;
        const hdr=lines[0].map(h=>h.trim());
        const get=(r,col)=>{const i=hdr.indexOf(col);return i>=0?(r[i]||'').trim():'';};
        const truthy=v=>['true','sim','1','yes','y'].includes(String(v||'').trim().toLowerCase());
        for(let i=1;i<lines.length;i++){
          const r=lines[i];const key=get(r,'chave');if(!key)continue;
          if(!SVC[key])SVC[key]={nome:key,cor:'#555555',cat:'Outros',maxP:0,booking:key,equip:'',horario:'',descr:'',obs:'',pending:false};
          if(get(r,'nome'))SVC[key].nome=get(r,'nome');
          if(get(r,'booking'))SVC[key].booking=get(r,'booking');
          if(get(r,'categoria'))SVC[key].cat=get(r,'categoria');
          if(get(r,'max_pessoas')){const v=parseInt(get(r,'max_pessoas'));if(!isNaN(v))SVC[key].maxP=v;}
          if(get(r,'equipamento'))SVC[key].equip=get(r,'equipamento');
          if(get(r,'horario'))SVC[key].horario=get(r,'horario');
          if(get(r,'descricao'))SVC[key].descr=get(r,'descricao');
          if(get(r,'observacoes'))SVC[key].obs=get(r,'observacoes');
          if(get(r,'cor'))SVC[key].cor=get(r,'cor');
          const cat=(SVC[key].cat||'').toLowerCase();
          SVC[key].inet=truthy(get(r,'inet'))||cat==='internet';
          SVC[key].media=truthy(get(r,'media'))||cat==='mídia'||cat==='midia';
        }
        setTick(t=>t+1);
      }catch(e){console.warn('Falha ao carregar catálogo de serviços',e);}
    }).catch(()=>{});
  },[]);

  useEffect(()=>{const fn=e=>{if(e.key==='Escape')setSel(null);};document.addEventListener('keydown',fn);return()=>document.removeEventListener('keydown',fn);},[]);

  const rodadasPresentes=useMemo(()=>[...new Set(jogos.map(j=>j.rodada))].sort(),[jogos]);
  const perfisPresentes=useMemo(()=>[...new Set(jogos.map(j=>getPerfil(j)))].sort((a,b)=>['D','A','E','C','F','B'].indexOf(a)-['D','A','E','C','F','B'].indexOf(b)),[jogos,tick]);

  const lista=useMemo(()=>{
    const lq=q.trim().toLowerCase();
    return jogos.filter(j=>{
      if(fR!=='todas'&&j.rodada!==fR)return false;
      if(fP!=='todos'&&getPerfil(j)!==fP)return false;
      if(fSvc!=='todos'&&!(j.servicos&&j.servicos[fSvc]))return false;
      if(lq){const hay=[j.selecao_1,j.selecao_2,j.local,j.dia_semana,nomeSel(j.selecao_1),nomeSel(j.selecao_2)].join(' ').toLowerCase();if(!hay.includes(lq))return false;}
      return true;
    });
  },[jogos,q,fR,fP,fSvc,tick]);

  const porRodada=useMemo(()=>{
    const g={};for(const j of lista){if(!g[j.rodada])g[j.rodada]=[];g[j.rodada].push(j);}
    return rodadasPresentes.filter(r=>g[r]).map(r=>{return{rodada:r,jogos:g[r]}});
  },[lista,rodadasPresentes]);

  const comSvc=jogos.filter(j=>Object.keys(j.servicos||{}).length>0).length;
  const statusInfo={loading:{dot:'loading',txt:'Carregando do Google Sheets…'},ok:{dot:'ok',txt:'Sincronizado com Google Sheets'},err:{dot:'err',txt:'Erro ao carregar Google Sheets — dados bloqueados'}}[srcStatus]||{dot:'err',txt:''};

  return h('div',null,
    h('header',{className:'hdr'},
      h('div',{className:'hdr-brand'},
        h('div',{className:'hdr-logo'},'C'),
        h('div',null,h('div',{className:'hdr-title'},'CazéTV · Copa 2026'),h('div',{className:'hdr-sub'},'Guia de Serviços FIFA · v5'))
      ),
      h('div',{className:'hdr-pills'},
        h('div',{className:'hdr-pill',style:{background:'rgba(232,0,45,.08)',color:'#E8002D',borderColor:'rgba(232,0,45,.2)'}},[`${jogos.length} jogos`]),
        h('div',{className:'hdr-pill',style:{background:'rgba(0,122,153,.08)',color:'#007A99',borderColor:'rgba(0,122,153,.2)'}},[`${comSvc} com serviços`])
      ),
      h('div',{className:'hdr-tabs'},
        h('div',{className:`hdr-tab${aba==='jogos'?' on':''}`,onClick:()=>setAba('jogos')},'Jogos'),
        h('div',{className:`hdr-tab${aba==='servicos'?' on':''}`,onClick:()=>setAba('servicos')},'Serviços')
      )
    ),
    aba==='servicos'?h(PainelServicos,null):(srcStatus==='ok'?h(React.Fragment,null,h('div',{className:'layout'},
      h('aside',{className:'sidebar'},
        h('div',{className:'fsec'},h('div',{className:'status-bar'},h('div',{className:`status-dot ${statusInfo.dot}`}),statusInfo.txt)),
        h('div',{className:'fsec'},h('div',{className:'flbl'},'Busca'),h('input',{className:'finput',placeholder:'Seleção, cidade…',value:q,onChange:e=>setQ(e.target.value)})),
        h('div',{className:'fsec'},
          h('div',{className:'flbl'},'Fase'),
          h('div',{className:'chips'},
            h('div',{className:`chip${fR==='todas'?' on':''}`,onClick:()=>setFR('todas')},'Todas'),
            ...rodadasPresentes.map(r=>h('div',{key:r,className:`chip ${r.replace(' ','').toLowerCase()}${fR===r?' on':''}`,onClick:()=>setFR(fR===r?'todas':r)},r))
          )
        ),
        h('div',{className:'fsec'},
          h('div',{className:'flbl'},'Perfil'),
          h('div',{className:'chips'},
            h('div',{className:`chip${fP==='todos'?' on':''}`,onClick:()=>setFP('todos')},'Todos'),
            ...perfisPresentes.map(p=>{const pf=PERFIS[p];const on=fP===p;return h('div',{key:p,className:'perfil-chip',style:{borderColor:pf.cor,color:on?'#fff':pf.cor,background:on?pf.cor:pf.bg},onClick:()=>setFP(on?'todos':p)},pf.label);})
          )
        ),
        h('div',{className:'fsec'},
          h('div',{className:'flbl'},'Serviço'),
          h('div',{className:'chips',style:{gap:'4px'}},
            h('div',{className:`chip${fSvc==='todos'?' on':''}`,onClick:()=>setFSvc('todos')},'Todos'),
            ...SVC_FILTROS.map(s=>{const on=fSvc===s.key;return h('div',{key:s.key,className:'perfil-chip',style:{borderColor:s.cor,color:on?'#fff':s.cor,background:on?s.cor:'rgba(0,0,0,.03)',fontSize:'9px',padding:'3px 7px'},onClick:()=>setFSvc(on?'todos':s.key)},s.nome);})
          )
        ),
        h('button',{className:'btn-clear',onClick:()=>{setQ('');setFR('todas');setFP('todos');setFSvc('todos');}},'Limpar')
      ),
      h('main',{className:'content'},
        lista.length===0
          ?h('div',{className:'empty'},h('div',{className:'empty-ico'},'⚽'),h('div',null,'Nenhum jogo encontrado.'))
          :h('div',null,
            h('div',{className:'ctop'},h('div',{className:'ccount'},'Mostrando ',h('strong',null,lista.length),' de ',jogos.length,' jogos')),
            ...porRodada.map(({rodada,jogos:rj})=>{
              const rc2=getRc(rodada);
              return h('div',{key:rodada},
                h('div',{className:'rodada-header'},h('div',{className:'rodada-badge',style:{background:rc2.cor,color:rc2.ct}},rodada),h('div',{className:'rodada-line'})),
                h('div',{className:'grid'},...rj.map(j=>h(Card,{key:j.numero,jogo:j,onClick:()=>setSel(j)})))
              );
            })
          )
      )
    ),
    sel&&h(Modal,{jogo:sel,onClose:()=>setSel(null),onChange:()=>setTick(t=>t+1)}),
    h('button',{className:'admin-fab',onClick:()=>setAdminOpen(true),title:'Serviços REQ'},'⏳'),
    adminOpen&&h(AdminPanel,{jogos,onClose:()=>setAdminOpen(false),onChange:()=>setTick(t=>t+1)})
    ):h(SheetErrorPanel,{status:srcStatus,error:sheetError}))
  );
}

function PessoasEditor({jogoNum,svcKey,maxP,cor,onChange,matchId,pessoas,jogo}){
  const slots=Array.from({length:maxP},(_,i)=>i);
  const [vals,setVals]=useState(pessoas||[]);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const timers=useRef({});

  useEffect(()=>{ setVals(pessoas||[]); },[svcKey,matchId,JSON.stringify(pessoas||[])]);

  async function savePessoa(i,v){
    setSaving(true);setErr('');
    const r=await gravar(matchId,`${svcKey}_p${i+1}`,v);
    setSaving(false);
    if(r.ok){
      if(jogo&&jogo.servicos&&jogo.servicos[svcKey]){
        const arr=[...(jogo.servicos[svcKey].pessoas||[])];
        arr[i]=v;
        jogo.servicos[svcKey].pessoas=arr;
      }
      onChange&&onChange();
    }else{
      setErr(r.error||'Erro ao salvar nome.');
    }
  }

  function handleChange(i,v){
    if(!APPS_SCRIPT_URL){setErr('Modo somente leitura: Apps Script não configurado.');return;}
    const nv=[...vals];nv[i]=v;setVals(nv);
    if(timers.current[i])clearTimeout(timers.current[i]);
    timers.current[i]=setTimeout(()=>savePessoa(i,v),800);
  }
  return h('div',{className:'pessoas-section'},
    h('div',{className:'pessoas-title',style:{color:cor}},
      'Pessoas neste serviço',
      saving&&h('span',{style:{marginLeft:8,fontSize:9,color:'#007A99',fontWeight:700}},'salvando…'),
      !APPS_SCRIPT_URL&&h('span',{style:{marginLeft:8,fontSize:9,color:'#aaa'}},'(somente leitura: Apps Script não configurado)')
    ),
    err&&h('div',{style:{fontSize:10,color:'#E8002D',fontWeight:700,marginBottom:6}},err),
    h('div',{className:'pessoas-grid'},
      ...slots.map(i=>h('div',{key:i,className:'pessoa-row'},
        h('div',{className:'pessoa-num'},i+1),
        h('input',{className:'pessoa-input',placeholder:`Pessoa ${i+1}…`,
          value:vals[i]||'',onChange:e=>handleChange(i,e.target.value),disabled:!APPS_SCRIPT_URL,
          onClick:e=>e.stopPropagation()})
      ))
    )
  );
}

function ObsEditor({jogo,svcKey,cor,obs,onChange}){
  const [val,setVal]=useState(obs||'');
  const [saving,setSaving]=useState(false);
  function handleChange(v){
    if(!APPS_SCRIPT_URL)return;
    setVal(v);
    clearTimeout(window._obsTimer);
    window._obsTimer=setTimeout(async()=>{
      setSaving(true);
      const r=await gravar(jogo.match_id,`${svcKey}_obs`,v);
      setSaving(false);
      if(r.ok){if(jogo.servicos[svcKey]) jogo.servicos[svcKey].obs=v;onChange&&onChange();}
    },800);
  }
  return h('div',{className:'obs-section'},
    h('div',{className:'obs-label',style:{color:cor}},
      'Observações operacionais',
      saving&&h('span',{style:{marginLeft:8,fontSize:9,color:'#007A99',fontWeight:700}},'salvando…'),
      !APPS_SCRIPT_URL&&h('span',{style:{marginLeft:8,fontSize:9,color:'#bbb'}},'(somente leitura: Apps Script não configurado)')
    ),
    h('textarea',{
      className:'obs-input',
      placeholder:'Adicione observações específicas para este serviço neste jogo…',
      value:val,
      onChange:e=>handleChange(e.target.value),
      disabled:!APPS_SCRIPT_URL,
      onClick:e=>e.stopPropagation(),
      rows:3,
    })
  );
}


function StatusEditor({jogo,svcKey,booking,status,qty,onChange}){
  const [ed,setEd]=useState(false);
  const [pw,setPw]=useState('');
  const [ns,setNs]=useState(status);
  const [nq,setNq]=useState(qty);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  async function save(){
    if(pw!==ADMIN_PASS){setErr('Senha incorreta');return;}
    setSaving(true);setErr('');
    const r1=await gravar(jogo.match_id,`${svcKey}_status`,ns,pw);
    const r2=await gravar(jogo.match_id,`${svcKey}_qty`,nq,pw);
    setSaving(false);
    if(r1.ok&&r2.ok){
      setEd(false);
      if(jogo.servicos[svcKey]){jogo.servicos[svcKey].status=ns;jogo.servicos[svcKey].qty=nq;}
      onChange&&onChange();
    }else setErr(r1.error||r2.error||'Erro ao gravar');
  }
  if(!ed)return h('div',{style:{display:'flex',alignItems:'center',gap:8}},
    h('span',{style:{color:status==='REQ'?'#B45309':'#16A34A',fontWeight:700}},
      status==='REQ'?'REQ · aguardando confirmação':'CNF · confirmado'),
    h('span',{style:{color:'#aaa',fontSize:11}},`×${qty}`),
    APPS_SCRIPT_URL?h('button',{onClick:e=>{e.stopPropagation();setEd(true);},
      style:{marginLeft:6,fontSize:9,padding:'2px 7px',border:'1px solid #ddd',borderRadius:2,background:'transparent',cursor:'pointer',color:'#777'}
    },'✎ editar'):h('span',{style:{marginLeft:6,fontSize:9,color:'#aaa'}},'somente leitura')
  );
  return h('div',{style:{display:'flex',flexDirection:'column',gap:6},onClick:e=>e.stopPropagation()},
    h('div',{style:{display:'flex',gap:6,alignItems:'center'}},
      h('select',{value:ns,onChange:e=>setNs(e.target.value),
        style:{padding:'4px 8px',border:'1px solid #ddd',borderRadius:2,fontFamily:'inherit',fontSize:12}},
        h('option',{value:'CNF'},'CNF'),h('option',{value:'REQ'},'REQ')
      ),
      h('input',{type:'number',min:0,max:99,value:nq,onChange:e=>setNq(parseInt(e.target.value)||0),
        style:{width:60,padding:'4px 8px',border:'1px solid #ddd',borderRadius:2,fontFamily:'inherit',fontSize:12}}),
      h('span',{style:{fontSize:10,color:'#aaa'}},booking)
    ),
    h('div',{style:{display:'flex',gap:6,alignItems:'center'}},
      h('input',{type:'password',placeholder:'Senha admin',value:pw,
        onChange:e=>{setPw(e.target.value);setErr('');},
        onKeyDown:e=>{if(e.key==='Enter')save();},
        style:{flex:1,padding:'5px 8px',border:'1px solid #ddd',borderRadius:2,fontFamily:'inherit',fontSize:12}},),
      h('button',{onClick:save,disabled:saving,
        style:{padding:'5px 12px',background:'#0A0A0A',color:'#fff',border:'none',borderRadius:2,fontFamily:'inherit',fontSize:11,fontWeight:700,cursor:'pointer'}},
        saving?'…':'Confirmar'),
      h('button',{onClick:()=>{setEd(false);setErr('');},
        style:{padding:'5px 8px',background:'transparent',color:'#aaa',border:'1px solid #ddd',borderRadius:2,fontFamily:'inherit',fontSize:11,cursor:'pointer'}},'Cancelar')
    ),
    err&&h('div',{style:{color:'var(--red)',fontSize:11,fontWeight:600}},err)
  );
}

function AdminPanel({jogos,onClose,onChange}){
  const [pw,setPw]=useState('');
  const [unlocked,setUnlocked]=useState(ADMIN_UNLOCKED);
  const [err,setErr]=useState(false);
  function tryUnlock(){if(pw===ADMIN_PASS){setUnlocked(true);ADMIN_UNLOCKED=true;setErr(false);}else{setErr(true);setPw('');}}
  const reqItems=[];
  for(const j of jogos){for(const[k,v]of Object.entries(j.servicos||{})){if(v.status==='REQ')reqItems.push({match_id:j.match_id,numero:j.numero,key:k,nome:SVC[k]?.nome||k,qty:v.qty,teams:`${j.selecao_1}/${j.selecao_2}`,rodada:j.rodada,jogo:j});}}
  reqItems.sort((a,b)=>a.numero-b.numero);
  return h('div',{className:'admin-overlay',onClick:onClose},
    h('div',{className:'admin-panel',onClick:e=>e.stopPropagation()},
      h('div',{className:'admin-head'},
        h('h2',null,unlocked?'Confirmar REQ → CNF':'Acesso protegido'),
        h('button',{className:'close',onClick:onClose},'×')
      ),
      h('div',{className:'admin-body'},
        !unlocked?h('div',null,
          h('div',{className:'admin-locked-msg'},APPS_SCRIPT_URL?'Editar status e quantidade requer senha. Você também pode editar diretamente na planilha do Sheets.':'Edição desativada: APPS_SCRIPT_URL não configurado.'),
          h('div',{className:'admin-pass-row'},
            h('input',{type:'password',placeholder:'Senha',value:pw,onChange:e=>{setPw(e.target.value);setErr(false);},onKeyDown:e=>{if(e.key==='Enter')tryUnlock();},autoFocus:true}),
            h('button',{onClick:tryUnlock,disabled:!APPS_SCRIPT_URL},'Entrar')
          ),
          err&&h('div',{className:'admin-error'},'Senha incorreta.')
        ):h('div',null,
          h('div',{className:'admin-section'},
            h('h3',null,'Serviços REQ'),
            h('div',{className:'admin-info'},`${reqItems.length} serviço${reqItems.length!==1?'s':''} aguardando. Confirmar aqui grava no Sheets.`),
            h('div',{className:'admin-req-list'},
              reqItems.length===0
                ?h('div',{style:{padding:'14px',textAlign:'center',color:'var(--muted)',fontSize:'11px'}},'Nenhum REQ.')
                :reqItems.map(it=>h(AdminReqRow,{key:`${it.match_id}|${it.key}`,it,onChange}))
            )
          )
        )
      ),
      h('div',{className:'admin-foot'},APPS_SCRIPT_URL?'Alterações gravam no Sheets em tempo real':'Modo somente leitura: Apps Script não configurado.')
    )
  );

function AdminReqRow({it,onChange}){
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  async function confirm(){
    if(!APPS_SCRIPT_URL)return;
    setSaving(true);
    const r=await gravar(it.match_id,`${it.key}_status`,'CNF',ADMIN_PASS);
    setSaving(false);
    if(r.ok){setDone(true);if(it.jogo.servicos[it.key])it.jogo.servicos[it.key].status='CNF';onChange&&onChange();}
  }
  return h('div',{className:`admin-req-row${done?' confirmed':''}`},
    h('div',{className:'admin-req-mid'},it.match_id),
    h('div',{className:'admin-req-name'},it.nome,h('small',null,`${it.teams} · ${it.rodada}`)),
    h('div',{className:'admin-req-qty'},`×${it.qty}`),
    done?h('span',{className:'admin-confirm-tag'},'CNF ✓'):h('button',{className:'admin-confirm-btn',onClick:confirm,disabled:saving},saving?'…':'Confirmar')
  );
}
function gerarPDF(jogo,n1,n2){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'pt',format:'a4'});
  const W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight();
  const ML=40, MR=40, TW=W-ML-MR;
  let y=0;

  // ── Utilitários ────────────────────────────────────────────────
  function h2r(hx){
    const m=(hx||'#888888').replace('#','').match(/.{2}/g);
    return[parseInt(m[0],16),parseInt(m[1],16),parseInt(m[2],16)];
  }
  function setF(style,size,r,g,b){
    doc.setFont('helvetica',style);doc.setFontSize(size);doc.setTextColor(r,g,b);
  }
  function rodape(){
    const pn=doc.internal.getCurrentPageInfo().pageNumber;
    doc.setDrawColor(220,220,220);doc.setLineWidth(.4);
    doc.line(ML,H-28,W-MR,H-28);
    setF('normal',7,160,160,160);
    doc.text(`CazéTV · FIFA World Cup 2026 · ${jogo.rodada} · Jogo #${jogo.numero}`,ML,H-16);
    doc.text(`Pág. ${pn}`,W-MR,H-16,'right');
  }
  const HDR_H=82; // altura reservada pro cabeçalho em todas as páginas
  function newPage(){rodape();doc.addPage();drawHeader();y=HDR_H+10;}
  function ck(n){if(y+n>H-46)newPage();}

  // ── Ordem e metadados ──────────────────────────────────────────
  const PDF_ORDER=[
    "presentation", "presentation_bg", "team_arrival", "guest_arrival", "dressing_room", "ml_player_arrival", "ml_coach", "centre_circle", "teams_onto", "pitch_reporter", "pitch_rep_benches", "digital_reporter", "ml_halftime", "ml_fulltime", "uniflash", "uniflash_fully", "tv_studio", "team_departure", "observer_seat", "media_pc_journ", "media_mz_tv", "media_mz_phone", "media_mz_digital", "media_pc_camera", "media_parking", "tv_studio_internet", "inet_behind_goal", "inet_bench_codec", "uniflash_inet"
  ];
  const PDF_NAMES={"presentation":"Presentation Touchline","presentation_bg":"Presentation Behind Goal","team_arrival":"Team Arrival","guest_arrival":"Guest Arrival","dressing_room":"Dressing Room","ml_player_arrival":"Multi · Entrevista Jogador","ml_coach":"Multi · Entrevista Técnico","centre_circle":"Centre Circle","teams_onto":"Team Onto Pitch","pitch_reporter":"Pitch Reporter","pitch_rep_benches":"Bench Reporter","digital_reporter":"Digital Reporter","ml_halftime":"Multiflash · Intervalo","ml_fulltime":"Multiflash · Pós-jogo","uniflash":"UniFlash Interview","uniflash_fully":"UniFlash (Fully Equipped)","tv_studio":"TV Interview Studio","team_departure":"Team Departure","observer_seat":"Observer Seats","media_pc_journ":"Press Conference","media_mz_tv":"Mixed Zone · TV","media_mz_phone":"Mixed Zone Station","media_mz_digital":"Mixed Zone · Digital","media_pc_camera":"Press Conf. + Câmera","media_parking":"Parking Pass","tv_studio_internet":"Internet · Touchline","inet_behind_goal":"Internet · Behind Goal","inet_bench_codec":"IP Codec · Bench Reporter","uniflash_inet":"Internet · UniFlash"};

  const rc=getRc(jogo.rodada);
  const[rr,rg,rb]=h2r(rc.cor);
  const mses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const[,mm,dd]=(jogo.data||'--').split('-');
  const dataL=dd&&mm?`${dd} ${mses[+mm-1]}`:jogo.data;

  const allSvcs=PDF_ORDER.map(k=>{
    const v=jogo.servicos[k];if(!v)return null;
    const meta=SVC[k]||{};
    const maxP=meta.maxP||0;
    // Acessos: Observer Seats = qty; outros = qty × maxP (se maxP>0)
    const acessos = k==='observer_seat' ? v.qty
                  : (maxP>0 ? v.qty*maxP : null); // null = não exibir (inet/infra)
    return{
      key:k, nome:PDF_NAMES[k]||meta.nome||k,
      booking:v.booking||meta.booking||k,
      status:v.status, qty:v.qty, acessos,
      fully:v.fully||false, cor:meta.cor||'#888888',
      isInet:!!meta.inet, isMedia:!!meta.media,
      horario:meta.horario||'', obs:meta.obs||'',
      descr:meta.descr||'', equip:meta.equip||'',
      pessoas:(v.pessoas||[]).filter(Boolean),
      nota:v.obs||'',  // obs do produtor por jogo
    };
  }).filter(Boolean);
  const mainSvcs =allSvcs.filter(s=>!s.isInet&&!s.isMedia);
  const mediaSvcs=allSvcs.filter(s=>s.isMedia);
  const inetSvcs =allSvcs.filter(s=>s.isInet);

  // ── Cabeçalho (repetido em todas as páginas) ───────────────────
  function drawHeader(){
    // Barra fina de cor da rodada no topo
    doc.setFillColor(rr,rg,rb);doc.rect(0,0,W,4,'F');
    // Fundo branco
    doc.setFillColor(255,255,255);doc.rect(0,4,W,HDR_H-4,'F');

    // Linha 1: rodada · jogo# · pick — cor da rodada
    setF('bold',7.5,rr,rg,rb);
    doc.text(`${jogo.rodada.toUpperCase()}  ·  JOGO #${jogo.numero}  ·  ${jogo.pick}`,ML,20);

    // Linha 2: times em destaque
    setF('bold',22,15,15,15);
    doc.text(n1,ML,42);
    const vsX=ML+doc.getTextWidth(n1)+10;
    setF('bold',14,rr,rg,rb);
    doc.text('×',vsX,42);
    const n2X=vsX+doc.getTextWidth('×')+10;
    setF('bold',22,15,15,15);
    doc.text(n2,n2X,42);

    // Linha 3: siglas · data · hora
    setF('normal',8,120,120,120);
    doc.text(`${jogo.selecao_1} × ${jogo.selecao_2}   ·   ${dataL}   ·   ${jogo.hora} BRT`,ML,58);

    // Linha 4: local
    setF('normal',8,160,160,160);
    doc.text(jogo.local,ML,70);

    // Linha divisória embaixo do cabeçalho
    doc.setDrawColor(220,220,220);doc.setLineWidth(.5);doc.line(0,HDR_H,W,HDR_H);
  }

  // Desenha cabeçalho da pág 1
  drawHeader();
  y=HDR_H+12;

  // ══════════════════════════════════════════════════════════════
  // PAINEL — tabela: Status | QTD/Acessos | Serviço | Pessoas
  // ══════════════════════════════════════════════════════════════

  // Totais
  const cntCNF=allSvcs.filter(s=>s.status==='CNF').length;
  const cntREQ=allSvcs.filter(s=>s.status==='REQ').length;
  setF('normal',7.5,130,130,130);
  doc.text(`${allSvcs.length} serviços`,ML,y);
  doc.setTextColor(22,163,74);
  doc.text(`${cntCNF} confirmados`,ML+58,y);
  if(cntREQ>0){doc.setTextColor(180,100,0);doc.text(`${cntREQ} aguardando`,ML+58+68,y);}
  y+=8;

  // Colunas: Status(36) | QTD(30) | Nome(160) | Acessos(40) | Pessoas(resto)
  const C_STATUS=36, C_QTD=30, C_NOME=160, C_ACESSOS=44;
  const C_PESSOAS=TW-C_STATUS-C_QTD-C_NOME-C_ACESSOS;
  const x_status =ML;
  const x_qtd    =ML+C_STATUS;
  const x_nome   =ML+C_STATUS+C_QTD;
  const x_acessos=ML+C_STATUS+C_QTD+C_NOME;
  const x_pess   =ML+C_STATUS+C_QTD+C_NOME+C_ACESSOS;

  // Header da tabela
  const TH=16;
  doc.setFillColor(240,240,240);doc.rect(ML,y,TW,TH,'F');
  doc.setDrawColor(210,210,210);doc.setLineWidth(.3);doc.rect(ML,y,TW,TH,'S');
  setF('bold',6.5,120,120,120);
  doc.text('STATUS',   x_status+C_STATUS/2,   y+10,'center');
  doc.text('QTD',      x_qtd+C_QTD/2,         y+10,'center');
  doc.text('SERVIÇO',  x_nome+4,               y+10);
  doc.text('ACESSOS',  x_acessos+C_ACESSOS/2, y+10,'center');
  doc.text('PESSOAS',  x_pess+4,               y+10);
  y+=TH;

  const LH_BASE=16;

  function tableRow(s,shade){
    const[sr,sg,sb]=h2r(s.cor);
    const isReq=s.status==='REQ';
    const pessoas=s.pessoas||[];
    const pessoasTxt=pessoas.length?pessoas.join('  ·  '):'—';
    const pessoasLines=doc.splitTextToSize(pessoasTxt,C_PESSOAS-8);
    const rowH=Math.max(LH_BASE,pessoasLines.length*10+10);
    ck(rowH);

    if(shade){doc.setFillColor(250,250,250);doc.rect(ML,y,TW,rowH,'F');}
    doc.setDrawColor(228,228,228);doc.setLineWidth(.25);
    doc.line(ML,y+rowH,ML+TW,y+rowH);
    // Barra colorida esquerda
    doc.setFillColor(sr,sg,sb);doc.rect(ML,y,2,rowH,'F');

    const midY=y+rowH/2;

    // Status badge — centrado verticalmente
    const bw=30,bh=11,bx=x_status+(C_STATUS-bw)/2,by=midY-bh/2;
    if(isReq){
      doc.setFillColor(254,243,199);doc.rect(bx,by,bw,bh,'F');
      setF('bold',6.5,180,100,0);doc.text('REQ',bx+bw/2,by+7.5,'center');
    } else {
      doc.setFillColor(236,253,245);doc.rect(bx,by,bw,bh,'F');
      setF('bold',6.5,22,163,74);doc.text('CNF',bx+bw/2,by+7.5,'center');
    }

    // QTD confirmada
    setF('bold',9,15,15,15);
    doc.text(String(s.qty),x_qtd+C_QTD/2,midY+3,'center');

    // Nome do serviço
    const nome=s.nome+(s.fully?' (Fully)':'');
    setF('bold',8.5,15,15,15);
    doc.text(nome,x_nome+4,midY+3);

    // Acessos totais
    if(s.acessos!==null&&s.acessos!==undefined){
      setF('bold',9,15,15,15);
      doc.text(String(s.acessos),x_acessos+C_ACESSOS/2,midY+3,'center');
    }

    // Pessoas
    if(pessoas.length){setF('normal',8,50,50,50);}
    else{setF('normal',8,185,185,185);}
    doc.text(pessoasLines,x_pess+4,y+11);

    y+=rowH;
  }

  function tableGroup(label,items){
    if(!items.length)return;
    ck(20+items.length*LH_BASE);
    y+=12;
    setF('bold',6.5,170,170,170);
    doc.text(label,ML,y);
    doc.setDrawColor(230,230,230);doc.setLineWidth(.35);
    doc.line(ML+doc.getTextWidth(label)+5,y-2,W-MR,y-2);
    y+=7;
    items.forEach((s,i)=>tableRow(s,i%2===1));
    y+=4;
  }

  tableGroup('SERVIÇOS',mainSvcs);
  tableGroup('ACESSOS DE MÍDIA',mediaSvcs);
  tableGroup('INTERNET',inetSvcs);

  // ══════════════════════════════════════════════════════════════
  // DETALHE — continua na mesma página
  // ══════════════════════════════════════════════════════════════
  ck(32);
  y+=10;
  doc.setDrawColor(210,210,210);doc.setLineWidth(.4);doc.line(ML,y,W-MR,y);
  y+=13;
  setF('bold',10,15,15,15);
  doc.text('DETALHAMENTO DOS SERVIÇOS',ML,y);
  doc.setDrawColor(rr,rg,rb);doc.setLineWidth(1.5);
  doc.line(ML,y+3,ML+doc.getTextWidth('DETALHAMENTO DOS SERVIÇOS'),y+3);
  y+=16;

  function drawDetail(s){
    const[sr,sg,sb]=h2r(s.cor);
    const isReq=s.status==='REQ';
    const LH=10;
    const obsLines=s.obs?doc.splitTextToSize(s.obs,TW-80).length:0;
    const blockH=14+LH+(s.horario?LH:0)+(s.equip?LH:0)+(s.descr?LH:0)+Math.max(obsLines,1)*LH+10;
    ck(blockH);
    doc.setFillColor(sr,sg,sb);doc.rect(ML,y,2,blockH,'F');
    doc.setDrawColor(232,232,232);doc.setLineWidth(.3);doc.rect(ML,y,TW,blockH,'S');
    const tx=ML+10,ty=y+13;
    setF('bold',10,15,15,15);
    const nome=s.nome+(s.fully?' (Fully Equipped)':'');
    doc.text(nome,tx,ty);
    setF('normal',8.5,150,150,150);
    doc.text(`×${s.qty}`,tx+doc.getTextWidth(nome)+5,ty);
    const bwb=28,bhb=10,bxb=ML+TW-bwb-5,byb=ty-9;
    if(isReq){
      doc.setFillColor(254,243,199);doc.rect(bxb,byb,bwb,bhb,'F');
      setF('bold',6.5,180,100,0);doc.text('REQ',bxb+bwb/2,byb+7,'center');
    } else {
      doc.setFillColor(236,253,245);doc.rect(bxb,byb,bwb,bhb,'F');
      setF('bold',6.5,22,163,74);doc.text('CNF',bxb+bwb/2,byb+7,'center');
    }
    let fy=ty+LH+2;
    function field(lbl,val,wrap){
      if(!val)return;
      setF('bold',6.5,175,175,175);doc.text(lbl,tx,fy);
      setF('normal',8,40,40,40);
      if(wrap){const vls=doc.splitTextToSize(val,TW-80);doc.text(vls,tx+72,fy);fy+=Math.max(vls.length*LH,LH);}
      else{doc.text(val,tx+72,fy);fy+=LH;}
    }
    field('HORÁRIO',s.horario,false);
    field('EQUIPAMENTO',s.equip,false);
    field('DESCRIÇÃO',s.descr,false);
    field('OBSERVAÇÕES COS',s.obs,true);
    field('NOTA',s.nota,true);  // obs do produtor por jogo
    y+=blockH+6;
  }

  function detailGroup(label,items){
    if(!items.length)return;
    ck(18);
    setF('bold',6.5,170,170,170);doc.text(label,ML,y);
    doc.setDrawColor(232,232,232);doc.setLineWidth(.35);
    doc.line(ML+doc.getTextWidth(label)+5,y-2,W-MR,y-2);
    y+=9;
    items.forEach(s=>drawDetail(s));
    y+=4;
  }

  detailGroup('SERVIÇOS',mainSvcs);
  detailGroup('ACESSOS DE MÍDIA',mediaSvcs);
  detailGroup('INTERNET',inetSvcs);
  rodape();

  const s1=(jogo.selecao_1||'').replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  const s2=(jogo.selecao_2||'').replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  doc.save(`CazeTV_J${String(jogo.numero).padStart(2,'0')}_${s1}x${s2}.pdf`);
}





ReactDOM.createRoot(document.getElementById('root')).render(h(App));
















</script>
</body>
</html>
