function gerarPDF(jogo, n1, n2, tzKey = "BRT") {
  if (!window.jspdf) { alert("Biblioteca jsPDF não carregou."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "a4" });
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const ML = 36, MR = 36, TW = W - ML - MR;
  const time = shiftGameTime(jogo.data, jogo.hora, tzKey);
  const fase = faseLabel(jogo.rodada);
  const rc = getRc(fase);

  function hexRgb(hex) {
    const m = String(hex || "#555555").replace("#", "").match(/.{2}/g) || ["55","55","55"];
    return m.map(x => parseInt(x, 16));
  }
  function setFont(style, size, rgb) {
    doc.setFont("helvetica", style);
    doc.setFontSize(size);
    doc.setTextColor(...(rgb || [40, 40, 40]));
  }

  let y = 0;

  function ck(need) {
    if (y + need > H - 36) { doc.addPage(); y = 0; drawPageHeader(); }
  }
  function hr(gap1 = 6, gap2 = 8) {
    y += gap1;
    doc.setDrawColor(210, 210, 210);
    doc.line(ML, y, W - MR, y);
    y += gap2;
  }

  function drawPageHeader() {
    const c = hexRgb(rc.cor);
    doc.setFillColor(...c);
    doc.rect(0, 0, W, 5, "F");
    setFont("bold", 7.5, c);
    doc.text(`${fase.toUpperCase()} · JOGO #${jogo.numero} · ${jogo.pick}`, ML, 20);
    setFont("bold", 18, [15, 15, 15]);
    doc.text(`${n1} × ${n2}`, ML, 41);
    setFont("normal", 8.5, [120, 120, 120]);
    const subLine = [`${jogo.selecao_1} × ${jogo.selecao_2}`, fmtDL(time.date), `${time.hora} ${time.label}`, jogo.local].filter(Boolean).join("  ·  ");
    doc.text(subLine, ML, 54);
    y = 64;
    doc.setDrawColor(...c);
    doc.setLineWidth(0.8);
    doc.line(ML, y, W - MR, y);
    doc.setLineWidth(0.2);
    y += 10;
  }

  function drawFooter() {
    const totalPages = doc.internal.getNumberOfPages();
    for (let p = 1; p <= totalPages; p++) {
      doc.setPage(p);
      setFont("normal", 7.5, [160, 160, 160]);
      doc.text(`${jogo.pick}  ·  FIFA World Cup 2026  ·  ${fase}  ·  Jogo #${jogo.numero}`, ML, H - 16);
      doc.text(`Pág. ${p}`, W - MR, H - 16, { align: "right" });
    }
  }

  const mainSvcs = serviceEntries(jogo, "main");
  const mediaSvcs = serviceEntries(jogo, "media");
  const inetSvcs = serviceEntries(jogo, "inet");
  const allSvcs = [...mainSvcs, ...mediaSvcs, ...inetSvcs];
  const cnfCount = allSvcs.filter(s => s.status === "CNF").length;
  const reqCount = allSvcs.filter(s => s.status === "REQ").length;

  drawPageHeader();

  setFont("normal", 9, [90, 90, 90]);
  const summaryParts = [`${allSvcs.length} serviços`, cnfCount > 0 ? `${cnfCount} confirmados` : null, reqCount > 0 ? `${reqCount} aguardando` : null].filter(Boolean).join("  ·  ");
  doc.text(summaryParts, ML, y);
  y += 18;

  // All y positions work from the TOP of each row (not baseline).
  // ROW_PAD = vertical padding inside each row (top & bottom).
  const ROW_PAD = 4;
  const ROW_LH  = 11;  // line-height for normal 8pt text
  const COL = { status: ML + 5, qty: ML + 36, nome: ML + 54, acess: ML + 230, pessoas: ML + 268 };

  function tableHeader() {
    setFont("bold", 7, [150, 150, 150]);
    const ty = y + 8; // baseline inside the header row
    doc.text("STATUS",  COL.status, ty);
    doc.text("QTD",     COL.qty,    ty);
    doc.text("SERVIÇO", COL.nome,   ty);
    doc.text("ACESS.",  COL.acess,  ty);
    doc.text("PESSOAS", COL.pessoas,ty);
    y += 14;
    doc.setDrawColor(200, 200, 200);
    doc.line(ML, y, W - MR, y);
    y += 6;
  }

  let tableRowIndex = 0;

  function sectionLabel(label) {
    ck(22);
    tableRowIndex = 0;
    y += 4;
    setFont("bold", 7, [140, 140, 140]);
    doc.text(label.toUpperCase(), ML + 5, y + 7);
    y += 14;
  }

  function tableRow(item) {
    const isReq = item.status === "REQ";
    const statusColor = isReq ? [180, 100, 0] : [22, 163, 74];
    const slots = Math.max(item.qty || 0, item.svc.maxP || 0) + (item.extraQty || 0);
    const pessoasFilled = (item.pessoas || []).filter(Boolean).length;

    // Pre-calculate wraps to know row height before drawing
    const nomeFull = item.svc.nome + (item.fully && !/fully/i.test(item.svc.nome) ? " (Fully)" : "");
    const qtyLabel = item.extraQty > 0 ? `×${item.qty}+${item.extraQty}` : item.qty > 1 ? `×${item.qty}` : "1";
    const pessoasStr = pessoasFilled > 0 ? (item.pessoas || []).filter(Boolean).join(", ") : "—";
    const pessoasMaxW = W - MR - COL.pessoas - 4;
    const nomeMaxW = COL.acess - COL.nome - 8;
    const nomeWrap    = doc.splitTextToSize(nomeFull, nomeMaxW);
    const pessoasWrap = doc.splitTextToSize(pessoasStr, pessoasMaxW);
    const obsEspRow   = item.obs ? item.obs.trim() : "";
    const obsEspWrap  = obsEspRow ? doc.splitTextToSize(obsEspRow, pessoasMaxW) : [];

    const leftLines  = nomeWrap.length;
    const rightLines = pessoasWrap.length + obsEspWrap.length;
    const innerH = Math.max(leftLines, rightLines, 1) * ROW_LH;
    const rowH   = innerH + ROW_PAD * 2;

    ck(rowH + 2);

    const rowTop = y;

    // 1. Background
    if (tableRowIndex % 2 === 0) {
      doc.setFillColor(246, 246, 246);
      doc.rect(ML, rowTop, TW, rowH, "F");
    }
    tableRowIndex++;

    // 2. Colour stripe (full row height)
    const cor = hexRgb(item.svc.cor || "#555555");
    doc.setFillColor(...cor);
    doc.rect(ML, rowTop, 3, rowH, "F");

    // 3. Text — baseline = rowTop + ROW_PAD + ~8 (cap height offset)
    const base = rowTop + ROW_PAD + 8;

    setFont("bold", 8, statusColor);
    doc.text(item.status, COL.status, base);

    setFont("normal", 8, [60, 60, 60]);
    doc.text(qtyLabel, COL.qty, base);

    setFont("normal", 8, [20, 20, 20]);
    nomeWrap.forEach((l, i) => doc.text(l, COL.nome, base + i * ROW_LH));

    setFont("normal", 8, [100, 100, 100]);
    doc.text(slots > 0 ? String(slots) : "—", COL.acess, base);

    setFont("normal", 8, [20, 20, 20]);
    pessoasWrap.forEach((l, i) => doc.text(l, COL.pessoas, base + i * ROW_LH));

    if (obsEspRow) {
      const obsBase = base + pessoasWrap.length * ROW_LH;
      setFont("italic", 7.5, [100, 100, 160]);
      obsEspWrap.forEach((l, i) => doc.text(l, COL.pessoas, obsBase + i * ROW_LH));
    }

    y = rowTop + rowH;
  }

  tableHeader();
  if (mainSvcs.length > 0) { sectionLabel("Serviços"); mainSvcs.forEach(tableRow); }
  if (mediaSvcs.length > 0) { y += 6; doc.setDrawColor(220,220,220); doc.line(ML,y,W-MR,y); y += 4; sectionLabel("Acessos de Mídia"); mediaSvcs.forEach(tableRow); }
  if (inetSvcs.length > 0)  { y += 6; doc.setDrawColor(220,220,220); doc.line(ML,y,W-MR,y); y += 4; sectionLabel("Internet");         inetSvcs.forEach(tableRow); }

  // ── DETAIL SECTION ────────────────────────────────────────────────────────
  function detailSectionTitle(label) {
    ck(32);
    y += 8;
    doc.setFillColor(240, 240, 240);
    doc.rect(ML, y, TW, 16, "F");
    setFont("bold", 7, [90, 90, 90]);
    doc.text(label.toUpperCase(), ML + 6, y + 11);
    y += 22;
  }

  function detailCard(item) {
    const s = item.svc;
    const isReq = item.status === "REQ";
    const cor = hexRgb(s.cor || "#555555");
    const statusColor = isReq ? [180, 100, 0] : [22, 163, 74];

    const LBL_X  = ML + 12;
    const VAL_X  = ML + 90;
    const VAL_W  = W - MR - VAL_X;
    const LH     = 11;

    const horLines  = s.horario ? doc.splitTextToSize(s.horario,  VAL_W) : [];
    const equiLines = s.equip   ? doc.splitTextToSize(s.equip,    VAL_W) : [];
    const descLines = s.descr   ? doc.splitTextToSize(s.descr,    VAL_W) : [];
    const obsLines  = s.obs     ? doc.splitTextToSize(s.obs,      VAL_W) : [];

    const bodyH = 8
      + (horLines.length  > 0 ? LH * horLines.length  + 4 : 0)
      + (equiLines.length > 0 ? LH * equiLines.length + 4 : 0)
      + (descLines.length > 0 ? LH * descLines.length + 4 : 0)
      + (obsLines.length  > 0 ? LH * obsLines.length  + 4 : 0);
    const headerH = 24;
    const cardH   = headerH + bodyH + 8;

    ck(cardH);
    const cardTop = y;

    // Colour stripe
    doc.setFillColor(...cor);
    doc.rect(ML, cardTop, 3, cardH, "F");

    // Card header: name left, status right
    setFont("bold", 10, [20, 20, 20]);
    const qLabel = item.extraQty > 0 ? ` ×${item.qty}+${item.extraQty} extra` : item.qty > 1 ? ` ×${item.qty}` : "";
    const nomeCardWrap = doc.splitTextToSize(`${s.nome}${qLabel}`, TW - 60);
    nomeCardWrap.forEach((l, i) => doc.text(l, LBL_X, cardTop + 14 + i * 13));
    setFont("bold", 8, statusColor);
    doc.text(item.status, W - MR, cardTop + 14, { align: "right" });

    y = cardTop + headerH + (nomeCardWrap.length > 1 ? (nomeCardWrap.length - 1) * 13 : 0);

    function labelVal(label, lines) {
      if (!lines || lines.length === 0) return;
      ck(lines.length * LH + 8);
      setFont("bold", 7.5, [140, 140, 140]);
      doc.text(label, LBL_X, y + 8);
      setFont("normal", 8, [40, 40, 40]);
      lines.forEach((l, i) => doc.text(l, VAL_X, y + 8 + i * LH));
      y += lines.length * LH + 6;
    }

    labelVal("HORÁRIO",          horLines);
    labelVal("EQUIPAMENTO",      equiLines);
    labelVal("DESCRIÇÃO",        descLines);
    labelVal("OBSERVAÇÕES COS",  obsLines);

    y += 6;
    doc.setDrawColor(220, 220, 220);
    doc.line(ML, y, W - MR, y);
    y += 12;
  }

  ck(50);
  y += 14;
  doc.setDrawColor(200, 200, 200);
  doc.line(ML, y, W - MR, y);
  y += 12;
  setFont("bold", 10, [30, 30, 30]);
  doc.text("DETALHAMENTO DOS SERVIÇOS", ML, y);
  y += 16;

  if (mainSvcs.length > 0) { detailSectionTitle("Serviços"); mainSvcs.forEach(detailCard); }
  if (mediaSvcs.length > 0) { detailSectionTitle("Acessos de Mídia"); mediaSvcs.forEach(detailCard); }
  if (inetSvcs.length > 0) { detailSectionTitle("Internet"); inetSvcs.forEach(detailCard); }

  drawFooter();

  const prefix = CURRENT_CHANNEL_KEY === "lmtv" ? "LMTV" : "CazeTV";
  const fname = `${prefix}_J${String(jogo.numero).padStart(2,"0")}_${String(jogo.selecao_1||"").replace(/[^A-Za-z0-9]/g,"")}x${String(jogo.selecao_2||"").replace(/[^A-Za-z0-9]/g,"")}.pdf`;
  doc.save(fname);
}

window.addEventListener("error",e=>console.error("Erro global:",e.error||e.message));
window.addEventListener("unhandledrejection",e=>console.error("Promise rejeitada:",e.reason));
ReactDOM.createRoot(document.getElementById("root")).render(h(ErrorBoundary,null,h(App)));
</script>
</body>
</html>
